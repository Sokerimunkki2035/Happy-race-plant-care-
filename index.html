<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasvivahti - PUHDAS VERSIO</title>
    <style>
        :root { --main-green: #4a6741; --bg-color: #f0f7f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 10px; color: #333; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; width: 100%; max-width: 400px; }
        
        .header-section { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }
        
        .btn { background: var(--main-green); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-action { padding: 10px; font-size: 0.8rem; }

        .screen { background: #e0ebe0; border: 3px solid var(--main-green); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; }
        #plant-img { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; border: 3px solid white; background: #ddd; margin: 0 auto 10px; display: block; }
        
        .info-box { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; }
        .label-text { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-item { background: #f1f1f1; padding: 8px; border-radius: 8px; text-align: center; font-size: 0.75rem; border: 1px solid #e0e0e0; }
        
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .blue { background: #4dabf7; } .orange { background: #fab005; } .cyan { background: #3bc9db; } .dry-btn { background: #ff922b; }

        #image-input { display: none; }
        .pot-result { background: #fff9c4; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; font-size: 0.85rem; border: 1px dashed #fbc02d; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-section">
        <span class="label-text">Valitse kasvi:</span>
        <select id="plant-selector" onchange="switchPlant()"></select>
        <button class="btn" onclick="addNewPlant()">+ Lisää uusi kasvi</button>
    </div>

    <div class="screen">
        <h2 id="display-name" style="margin:0 0 10px 0;">Kasvi</h2>
        <img id="plant-img" src="" alt="Kuva">
        <button class="btn" style="width:auto; padding:5px 15px; font-size:0.8rem;" onclick="document.getElementById('image-input').click()">📸 Vaihda kuva</button>
        <input type="file" id="image-input" accept="image/*">
    </div>

    <div class="info-box">
        <span class="label-text">Muokkaa nimeä:</span>
        <input type="text" id="input-name" placeholder="Nimi" oninput="saveCurrentData()">
        
        <span class="label-text">Ruukun koko (cm):</span>
        <input type="number" id="input-pot" placeholder="esim. 12" oninput="saveCurrentData()">
        
        <button class="btn" style="background:#666;" onclick="showPotAdvice()">🛒 Ruukku-muistilappu</button>
        <div id="pot-advice" class="pot-result"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-item">💧 Kasteltu:<br><b id="view-water">-</b></div>
        <div class="stat-item">🧪 Lannoitettu:<br><b id="view-feed">-</b></div>
        <div class="stat-item">☁️ Suihkutettu:<br><b id="view-mist">-</b></div>
        <div class="stat-item">☀️ Kuivattu:<br><b id="view-dry">-</b></div>
    </div>

    <div class="actions-grid">
        <button class="btn btn-action blue" onclick="recordAction('water')">Kastele</button>
        <button class="btn btn-action orange" onclick="recordAction('feed')">Lannoita</button>
        <button class="btn btn-action cyan" onclick="recordAction('mist')">Suihkuta</button>
        <button class="btn btn-action dry-btn" onclick="recordAction('dry')">Kuivaa</button>
    </div>
</div>

<script>
    // HUOM: Vaihdettu tallennusavain 'kasvigalleria_V3', jotta vanha bugitiedosto ei sotke
    let plantList = JSON.parse(localStorage.getItem('kasvigalleria_V3')) || [
        { id: Date.now(), name: "Afrikan fiikus", pot: 12, water: "-", feed: "-", mist: "-", dry: "-", img: "" }
    ];
    let activePlantId = plantList[0].id;

    function init() {
        renderSelector();
        showActivePlant();
    }

    function renderSelector() {
        const sel = document.getElementById('plant-selector');
        sel.innerHTML = "";
        plantList.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.innerText = p.name;
            opt.selected = (p.id == activePlantId);
            sel.appendChild(opt);
        });
    }

    function switchPlant() {
        activePlantId = document.getElementById('plant-selector').value;
        showActivePlant();
    }

    function addNewPlant() {
        const newObj = { id: Date.now(), name: "Uusi kasvi", pot: "", water: "-", feed: "-", mist: "-", dry: "-", img: "" };
        plantList.push(newObj);
        activePlantId = newObj.id;
        saveToStorage();
        renderSelector();
        showActivePlant();
    }

    function showActivePlant() {
        const p = plantList.find(x => x.id == activePlantId);
        if(!p) return;

        document.getElementById('display-name').innerText = p.name;
        document.getElementById('input-name').value = p.name;
        document.getElementById('input-pot').value = p.pot;
        
        document.getElementById('view-water').innerText = p.water;
        document.getElementById('view-feed').innerText = p.feed;
        document.getElementById('view-mist').innerText = p.mist;
        document.getElementById('view-dry').innerText = p.dry;

        const imgEl = document.getElementById('plant-img');
        imgEl.src = p.img || "https://via.placeholder.com/160?text=Ei+kuvaa";
        
        document.getElementById('pot-advice').style.display = 'none';
    }

    function saveCurrentData() {
        const p = plantList.find(x => x.id == activePlantId);
        p.name = document.getElementById('input-name').value;
        p.pot = document.getElementById('input-pot').value;
        
        document.getElementById('display-name').innerText = p.name;
        
        // Päivitetään nimi selectoriin
        const opt = document.querySelector(`#plant-selector option[value="${activePlantId}"]`);
        if(opt) opt.innerText = p.name;
        
        saveToStorage();
    }

    function recordAction(type) {
        const p = plantList.find(x => x.id == activePlantId);
        p[type] = new Date().toLocaleDateString('fi-FI');
        saveToStorage();
        showActivePlant();
    }

    function saveToStorage() {
        localStorage.setItem('kasvigalleria_V3', JSON.stringify(plantList));
    }

    // Kuvan tallennus korjattu
    document.getElementById('image-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function() {
            const p = plantList.find(x => x.id == activePlantId);
            p.img = reader.result;
            document.getElementById('plant-img').src = reader.result;
            saveToStorage();
        };
        reader.readAsDataURL(file);
    });

    function showPotAdvice() {
        const p = plantList.find(x => x.id == activePlantId);
        const size = parseInt(p.pot);
        const div = document.getElementById('pot-advice');
        if(!size) {
            div.innerText = "Syötä nykyisen ruukun koko (cm) ensin.";
        } else {
            div.innerHTML = `<strong>MUISTIIN:</strong><br>Hanki uusi ruukku kokoa <b>${size+2} - ${size+4} cm</b>.`;
        }
        div.style.display = 'block';
    }

    init();
</script>

</body>
</html>
