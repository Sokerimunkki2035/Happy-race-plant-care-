<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasvivahti Pro - Korjattu</title>
    <style>
        :root { --main-green: #4a6741; --bg-color: #f0f7f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 25px; width: 100%; max-width: 450px; }
        
        .header-nav { margin-bottom: 20px; display: flex; gap: 10px; flex-direction: column; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box; margin-top: 5px; }
        .btn-add { background: var(--main-green); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; }

        .screen { background: #e0ebe0; border: 4px solid var(--main-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #plant-img { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 4px solid white; background: #ccc; margin: 10px auto; display: block; }
        .upload-btn { background: #fff; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: 1px solid #ccc; display: inline-block; margin-top: 10px; }

        .box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--main-green); }
        .doctor-box { background: #e3f2fd; border-left-color: #2196f3; }
        .pot-note { background: #fff9c4; border: 1px dashed #fbc02d; padding: 10px; margin-top: 10px; display: none; font-size: 0.9rem; border-radius: 10px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.8rem; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .actions button { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        
        #image-input { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-nav">
        <label><b>🌿 Valitse kasvi:</b></label>
        <select id="plant-selector" onchange="changePlant()"></select>
        <button class="btn-add" onclick="addNewPlant()">+ Lisää uusi kasvi</button>
    </div>

    <div class="screen">
        <h2 id="title-name">Kasvi</h2>
        <img id="plant-img" src="" alt="Kasvin kuva">
        <label class="upload-btn" for="image-input">📸 Päivitä kuva</label>
        <input type="file" id="image-input" accept="image/*">
    </div>

    <div class="box">
        <label><b>Kasvin nimi:</b></label>
        <input type="text" id="edit-name" oninput="updateData()">
        
        <label style="margin-top:10px; display:block;"><b>Ruukun halkaisija (cm):</b></label>
        <input type="number" id="edit-pot" oninput="updateData()">
        
        <button class="btn-add" style="margin-top:15px;" onclick="showPotAdvice()">🛒 Tee kauppalappu ruukulle</button>
        <div id="pot-advice" class="pot-note"></div>
    </div>

    <div class="box doctor-box">
        <strong>👨‍⚕️ Kasvitohtori</strong>
        <select id="doctor-select" onchange="runDoctor()">
            <option value="">-- Onko kasvi elossa? --</option>
            <option value="scratch">Kynsitesti (onko vihreää?)</option>
            <option value="dry">Varsi on kuiva ja ruskea</option>
            <option value="soft">Varsi on pehmeä/löllö</option>
            <option value="roots">Juuret ovat mullan alla</option>
        </select>
        <div id="doctor-msg" style="margin-top:10px; font-size:0.85rem; font-style:italic;"></div>
    </div>

    <div class="stats">
        <div class="stat-item">💧 Kasteltu:<br><b id="st-water">-</b></div>
        <div class="stat-item">🧪 Lannoitettu:<br><b id="st-feed">-</b></div>
        <div class="stat-item">☁️ Suihkutettu:<br><b id="st-mist">-</b></div>
        <div class="stat-item">☀️ Kuivattu:<br><b id="st-dry">-</b></div>
    </div>

    <div class="actions">
        <button style="background:#4dabf7;" onclick="doAction('water')">Kastele</button>
        <button style="background:#fab005;" onclick="doAction('feed')">Lannoita</button>
        <button style="background:#3bc9db;" onclick="doAction('mist')">Suihkuta</button>
        <button style="background:#ff922b;" onclick="doAction('dry')">Kuivaa</button>
    </div>
</div>

<script>
    // Alustetaan tiedot tai haetaan muistista
    let plants = JSON.parse(localStorage.getItem('kasvigalleria_final')) || [
        { id: 1, name: "Afrikan fiikus", pot: 12, water: "-", feed: "-", mist: "-", dry: "-", img: "" }
    ];
    let activeId = plants[0].id;

    function renderSelector() {
        const sel = document.getElementById('plant-selector');
        sel.innerHTML = plants.map(p => `<option value="${p.id}" ${p.id == activeId ? 'selected' : ''}>${p.name}</option>`).join('');
        loadPlant();
    }

    function changePlant() {
        activeId = document.getElementById('plant-selector').value;
        loadPlant();
    }

    function addNewPlant() {
        const newP = { id: Date.now(), name: "Uusi kasvi", pot: 0, water: "-", feed: "-", mist: "-", dry: "-", img: "" };
        plants.push(newP);
        activeId = newP.id;
        save();
        renderSelector();
    }

    function loadPlant() {
        const p = plants.find(x => x.id == activeId);
        if(!p) return;

        document.getElementById('title-name').innerText = p.name;
        document.getElementById('edit-name').value = p.name;
        document.getElementById('edit-pot').value = p.pot || "";
        
        // Kuvan lataus: Jos kuvaa ei ole, käytetään harmaata pohjaa
        const imgDisplay = document.getElementById('plant-img');
        imgDisplay.src = p.img || "https://via.placeholder.com/180?text=Ota+kuva";
        
        document.getElementById('st-water').innerText = p.water;
        document.getElementById('st-feed').innerText = p.feed;
        document.getElementById('st-mist').innerText = p.mist;
        document.getElementById('st-dry').innerText = p.dry;
        
        // Nollataan aputekstit
        document.getElementById('pot-advice').style.display = 'none';
        document.getElementById('doctor-msg').innerText = "";
        document.getElementById('doctor-select').value = "";
    }

    function updateData() {
        const p = plants.find(x => x.id == activeId);
        p.name = document.getElementById('edit-name').value;
        p.pot = document.getElementById('edit-pot').value;
        
        document.getElementById('title-name').innerText = p.name;
        
        // Päivitetään nimi pudotusvalikkoon
        const option = document.querySelector(`#plant-selector option[value="${activeId}"]`);
        if(option) option.innerText = p.name;
        
        save();
    }

    function doAction(type) {
        const p = plants.find(x => x.id == activeId);
        p[type] = new Date().toLocaleDateString('fi-FI');
        save();
        loadPlant();
    }

    function save() { 
        localStorage.setItem('kasvigalleria_final', JSON.stringify(plants)); 
    }

    // Kuvan käsittely korjattu
    document.getElementById('image-input').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const p = plants.find(x => x.id == activeId);
            p.img = reader.result;
            document.getElementById('plant-img').src = reader.result;
            save();
        };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    });

    function showPotAdvice() {
        const pot = parseInt(document.getElementById('edit-pot').value);
        const div = document.getElementById('pot-advice');
        if(!pot) { 
            div.innerHTML = "⚠️ Syötä nykyisen ruukun koko ensin!"; 
        } else { 
            div.innerHTML = `<strong>KAUPOILLE:</strong><br>Hanki uusi ruukku kokoa <b>${pot+2} - ${pot+4} cm</b>.<br>Varmista, että siinä on reikä pohjassa!`; 
        }
        div.style.display = 'block';
    }

    function runDoctor() {
        const val = document.getElementById('doctor-select').value;
        const msg = document.getElementById('doctor-msg');
        const tips = {
            scratch: "Raaputa vartta kynnellä: jos alta paljastuu vihreää, kasvi on elossa! Jos se on ruskeaa, kokeile alempaa.",
            dry: "Jos varsi napsahtaa poikki kuin kuiva oksa, se on kuollut. Jos se taipuu, siellä on vielä elämää.",
            soft: "Pehmeä varsi on usein merkki mädästä. Leikkaa pehmeä osa pois terveeseen (kovaan) kohtaan asti.",
            roots: "Tarkista juuret mullan alta: valkoiset = hyvä, ruskeat/löysät = liikaa vettä."
        };
        msg.innerText = tips[val] || "";
    }

    // Käynnistetään sivu
    renderSelector();
</script>

</body>
</html>
