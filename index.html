<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasvivahti Pro</title>
    <style>
        :root { --main-green: #4a6741; --bg-color: #f0f7f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 25px; width: 100%; max-width: 450px; }
        
        /* Valitsin ja Lisäys */
        .header-nav { margin-bottom: 20px; display: flex; gap: 10px; flex-direction: column; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box; }
        .btn-add { background: var(--main-green); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 10px; font-weight: bold; }

        /* Tamagotchi-näyttö */
        .screen { background: #e0ebe0; border: 4px solid var(--main-green); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; position: relative; }
        #plant-img { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 4px solid white; background: #eee; margin: 10px auto; display: block; }
        .upload-btn { background: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: 1px solid #ccc; display: inline-block; }

        /* Tohtori & Ruukku */
        .box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--main-green); }
        .doctor-box { background: #e3f2fd; border-left-color: #2196f3; }
        .pot-note { background: #fff9c4; border: 1px dashed #fbc02d; padding: 10px; margin-top: 10px; display: none; font-size: 0.9rem; }

        /* Tilastot ja Napit */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 10px; text-align: center; font-size: 0.8rem; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .actions button { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .actions button:active { transform: scale(0.95); }
        
        #image-input { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-nav">
        <label style="font-weight:bold;">🌿 Valitse hoidettava kasvi:</label>
        <select id="plant-selector" onchange="changePlant()"></select>
        <button class="btn-add" onclick="addNewPlant()">+ Lisää uusi kasvi listaan</button>
    </div>

    <div class="screen">
        <h2 id="title-name">Kasvi</h2>
        <img id="plant-img" src="" alt="Kasvin kuva">
        <label class="upload-btn" for="image-input">📸 Päivitä kuva</label>
        <input type="file" id="image-input" accept="image/*">
    </div>

    <div class="box">
        <label>Muokkaa nimeä:</label>
        <input type="text" id="edit-name" oninput="updateData()">
        <label style="margin-top:10px; display:block;">Ruukun halkaisija (cm):</
